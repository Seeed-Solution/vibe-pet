[platformio]
default_envs = code_pet

[env:code_pet]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = huge_app.csv
board_upload.flash_size = 8MB
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  moononournation/GFX Library for Arduino@1.4.7
  hideakitai/PCA95x5@^0.1.3
  lvgl/lvgl@^8.4.0
build_flags =
  -DCODE_PET_DISPLAY_ARDUINO_GFX
  -DCODE_PET_USE_SENSECAP_INDICATOR
  -DCODE_PET_HAS_BLE
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DCODE_PET_USE_LVGL
  -DCODE_PET_USE_LVGL_PERSONA
  -DLV_CONF_INCLUDE_SIMPLE
  -I src
  -DCODE_PET_DEVICE_NAME=\"VibePet-SenseCAP-Indicator\"
  -DCP_TFT_WIDTH=480
  -DCP_TFT_HEIGHT=480
  -DCP_TFT_ROTATION=0
  -DSCREEN_WIDTH=480
  -DSCREEN_HEIGHT=480
  -DGFX_BL=45
  -DCODE_PET_ARDUINO_GFX_SPEED=12000000L
  -DCODE_PET_ARDUINO_GFX_AUTO_FLUSH=1
  -DCODE_PET_LVGL_BUFFER_ROWS=8
  -DCODE_PET_LVGL_IMAGE_BASE_ZOOM=512
  -DCODE_PET_LVGL_PRESCALE_IMAGE=0
  -DCODE_PET_ANIMATION_FRAME_MS=260
  -DCODE_PET_LVGL_TFT_SWAP_BYTES=0
  -DCODE_PET_LVGL_TFT_SWAP_RB=0
