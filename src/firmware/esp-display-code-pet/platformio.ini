[platformio]
default_envs = m5stack_core2

[common]
framework = arduino
monitor_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.0.4

[m5_common]
platform = espressif32
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
  ${common.lib_deps}
  m5stack/M5Unified@^0.2.7
build_flags =
  -DCODE_PET_DISPLAY_M5UNIFIED
  -DCODE_PET_HAS_BLE

[gfx_common]
platform = espressif32
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
  ${common.lib_deps}
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  -DCODE_PET_DISPLAY_TFT_ESPI
  -DCODE_PET_HAS_BLE

[oled_esp32_common]
platform = espressif32
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
  ${common.lib_deps}
  adafruit/Adafruit SSD1306@^2.5.13
build_flags =
  -DCODE_PET_DISPLAY_OLED
  -DCODE_PET_HAS_BLE

[oled_esp8266_common]
platform = espressif8266
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
  ${common.lib_deps}
  adafruit/Adafruit SSD1306@^2.5.13
build_flags =
  -DCODE_PET_DISPLAY_OLED
  -DCODE_PET_USE_WIFI
  -DCODE_PET_WIFI_SSID=\"\"
  -DCODE_PET_WIFI_PASSWORD=\"\"
  -DCODE_PET_BRIDGE_URL=\"http://192.168.1.2:17384/api/device-snapshot\"

[env:m5stack_core2]
extends = m5_common
board = esp32dev
build_flags =
  ${m5_common.build_flags}
  -DCODE_PET_DEVICE_NAME=\"VibePet-M5-Core2\"

[env:m5stack_cores3]
extends = m5_common
board = esp32-s3-devkitc-1
build_flags =
  ${m5_common.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCODE_PET_DEVICE_NAME=\"VibePet-M5-CoreS3\"

[env:m5stickc_plus2]
extends = m5_common
board = esp32dev
build_flags =
  ${m5_common.build_flags}
  -DCODE_PET_DEVICE_NAME=\"VibePet-M5StickC-Plus2\"

[env:m5stack_cardputer]
extends = m5_common
board = esp32-s3-devkitc-1
build_flags =
  ${m5_common.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCODE_PET_DEVICE_NAME=\"VibePet-M5-Cardputer\"

[env:m5stack_atoms3]
extends = m5_common
board = esp32-s3-devkitc-1
build_flags =
  ${m5_common.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCODE_PET_DEVICE_NAME=\"VibePet-M5-AtomS3\"

[env:lilygo_t_display]
extends = gfx_common
board = esp32dev
build_flags =
  ${gfx_common.build_flags}
  -DCODE_PET_DEVICE_NAME=\"VibePet-LILYGO-TDisplay\"
  -DUSER_SETUP_LOADED
  -DST7789_DRIVER
  -DTFT_RGB_ORDER=TFT_BGR
  -DCP_TFT_WIDTH=135
  -DCP_TFT_HEIGHT=240
  -DCP_TFT_ROTATION=1
  -DTFT_WIDTH=135
  -DTFT_HEIGHT=240
  -DTFT_MOSI=19
  -DTFT_SCLK=18
  -DTFT_CS=5
  -DTFT_DC=16
  -DTFT_RST=23
  -DTFT_BL=4
  -DTFT_BACKLIGHT_ON=HIGH
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DSMOOTH_FONT

[env:lilygo_t_display_s3]
extends = gfx_common
board = esp32-s3-devkitc-1
build_flags =
  ${gfx_common.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCODE_PET_DEVICE_NAME=\"VibePet-LILYGO-TDisplay-S3\"
  -DUSER_SETUP_LOADED
  -DST7789_DRIVER
  -DTFT_PARALLEL_8_BIT
  -DTFT_RGB_ORDER=TFT_BGR
  -DCP_TFT_WIDTH=170
  -DCP_TFT_HEIGHT=320
  -DCP_TFT_ROTATION=1
  -DTFT_WIDTH=170
  -DTFT_HEIGHT=320
  -DTFT_CS=6
  -DTFT_DC=7
  -DTFT_RST=5
  -DTFT_WR=8
  -DTFT_RD=9
  -DTFT_D0=39
  -DTFT_D1=40
  -DTFT_D2=41
  -DTFT_D3=42
  -DTFT_D4=45
  -DTFT_D5=46
  -DTFT_D6=47
  -DTFT_D7=48
  -DTFT_BL=38
  -DTFT_BACKLIGHT_ON=HIGH
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DSMOOTH_FONT

[env:esp_ai_common_3_tft]
extends = gfx_common
board = esp32-s3-devkitc-1
lib_deps =
  ${gfx_common.lib_deps}
  adafruit/Adafruit NeoPixel@^1.12.3
  lvgl/lvgl@^8.4.0
build_flags =
  ${gfx_common.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSE_HSPI_PORT
  -DCODE_PET_USE_LVGL
  -DCODE_PET_USE_LVGL_PERSONA
  -DCODE_PET_LVGL_TFT_SWAP_BYTES=1
  -DCODE_PET_LVGL_TFT_SWAP_RB=1
  -DLV_CONF_INCLUDE_SIMPLE
  -I src
  -DCODE_PET_DEVICE_NAME=\"VibePet-ESP-AI-V3-TFT\"
  -DCODE_PET_STATUS_PIXEL
  -DCP_STATUS_PIXEL_PIN=46
  -DCP_STATUS_PIXEL_BRIGHTNESS=56
  -DUSER_SETUP_LOADED
  -DST7789_DRIVER
  -DTFT_RGB_ORDER=TFT_BGR
  -DCP_TFT_WIDTH=240
  -DCP_TFT_HEIGHT=240
  -DCP_TFT_ROTATION=0
  -DSCREEN_WIDTH=240
  -DSCREEN_HEIGHT=240
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=240
  -DTFT_MOSI=39
  -DTFT_SCLK=38
  -DTFT_CS=9
  -DTFT_DC=13
  -DTFT_RST=-1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DSMOOTH_FONT

[env:esp_ai_diy_esp32s3_oled]
extends = oled_esp32_common
board = esp32-s3-devkitc-1
lib_deps =
  ${oled_esp32_common.lib_deps}
  adafruit/Adafruit NeoPixel@^1.12.3
build_flags =
  ${oled_esp32_common.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCODE_PET_DEVICE_NAME=\"VibePet-ESP-AI-DIY-S3-OLED\"
  -DCODE_PET_STATUS_PIXEL
  -DCP_STATUS_PIXEL_PIN=46
  -DCP_STATUS_PIXEL_BRIGHTNESS=56
  -DCP_OLED_WIDTH=128
  -DCP_OLED_HEIGHT=64
  -DCP_OLED_SDA=39
  -DCP_OLED_SCL=38
  -DCP_OLED_RST=-1

[env:heltec_wifi_kit_32]
extends = oled_esp32_common
board = esp32dev
build_flags =
  ${oled_esp32_common.build_flags}
  -DCODE_PET_DEVICE_NAME=\"VibePet-Heltec-WiFi-Kit-32\"
  -DCP_OLED_WIDTH=128
  -DCP_OLED_HEIGHT=64
  -DCP_OLED_SDA=4
  -DCP_OLED_SCL=15
  -DCP_OLED_RST=16

[env:heltec_wifi_kit_8]
extends = oled_esp8266_common
board = d1_mini
build_flags =
  ${oled_esp8266_common.build_flags}
  -DCODE_PET_DEVICE_NAME=\"VibePet-Heltec-WiFi-Kit-8\"
  -DCP_OLED_WIDTH=128
  -DCP_OLED_HEIGHT=32
  -DCP_OLED_SDA=4
  -DCP_OLED_SCL=5
  -DCP_OLED_RST=16

[env:wemos_d1_mini_oled]
extends = oled_esp8266_common
board = d1_mini
build_flags =
  ${oled_esp8266_common.build_flags}
  -DCODE_PET_DEVICE_NAME=\"VibePet-WEMOS-D1-OLED\"
  -DCP_OLED_WIDTH=64
  -DCP_OLED_HEIGHT=48
  -DCP_OLED_SDA=4
  -DCP_OLED_SCL=5
  -DCP_OLED_RST=-1
