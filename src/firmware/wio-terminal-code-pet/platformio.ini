[env:wio_terminal]
platform = atmelsam
board = seeed_wio_terminal
framework = arduino
monitor_speed = 115200
lib_deps =
  https://github.com/Seeed-Studio/Seeed_Arduino_LCD.git
  https://github.com/Seeed-Studio/Seeed_Arduino_FS.git
  https://github.com/Seeed-Studio/Seeed_Arduino_rpcUnified.git
  https://github.com/Seeed-Studio/Seeed_Arduino_rpcBLE.git
  bblanchon/ArduinoJson@^7.0.4
build_flags =
  -DCODE_PET_DISPLAY_TFT_ESPI
  -DCODE_PET_HAS_RPC_BLE
  -DCODE_PET_USE_SIMPLE_DYNAMIC_PERSONA
  -DCODE_PET_DEVICE_NAME=\"VibePet-Wio\"
  -DCODE_PET_TEST_BUTTON_PIN=WIO_5S_PRESS
  -DCP_TFT_ROTATION=3
  -DTFT_BL=LCD_BACKLIGHT
  -DTFT_BACKLIGHT_ON=HIGH
