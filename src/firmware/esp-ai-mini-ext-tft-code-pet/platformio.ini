[platformio]
default_envs = code_pet

[env:code_pet]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = huge_app.csv
board_upload.flash_size = 8MB
lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  bodmer/TFT_eSPI@^2.5.43
  adafruit/Adafruit NeoPixel@^1.12.3
  lvgl/lvgl@^8.4.0
build_flags =
  -DCODE_PET_DISPLAY_TFT_ESPI
  -DCODE_PET_HAS_BLE
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
  -DUSE_HSPI_PORT
  -DCODE_PET_USE_LVGL
  -DCODE_PET_USE_LVGL_PERSONA
  -DCODE_PET_LVGL_BUFFER_IN_PSRAM=1
  -DCODE_PET_SYNC_PROGRESS_UI_MS=250
  -DCODE_PET_BLE_PAYLOAD_QUEUE_SIZE=128
  -DCODE_PET_LVGL_TFT_SWAP_BYTES=1
  -DCODE_PET_LVGL_TFT_SWAP_RB=1
  -DLV_CONF_INCLUDE_SIMPLE
  -I src
  -DCODE_PET_DEVICE_NAME=\"VibePet-ESP-AI-Mini-TFT\"
  -DCODE_PET_USE_BACKLIGHT_CONTROL
  -DCODE_PET_STATUS_PIXEL
  -DCP_STATUS_PIXEL_PIN=18
  -DCP_STATUS_PIXEL_BRIGHTNESS=48
  -DUSER_SETUP_LOADED
  -DST7789_2_DRIVER
  -DTFT_RGB_ORDER=TFT_BGR
  -DCP_TFT_WIDTH=320
  -DCP_TFT_HEIGHT=240
  -DCP_TFT_ROTATION=3
  -DSCREEN_WIDTH=320
  -DSCREEN_HEIGHT=240
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MOSI=42
  -DTFT_SCLK=39
  -DTFT_CS=13
  -DTFT_DC=7
  -DTFT_RST=-1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DSMOOTH_FONT
